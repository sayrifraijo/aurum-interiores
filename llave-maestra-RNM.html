<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Llave Maestra — Aurum Arquitectos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Poppins:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F7F4EF;
  --warm-white: #FDFBF8;
  --stone: #C4B8A8;
  --taupe: #8C7B6B;
  --bark: #4A3728;
  --charcoal: #2C2420;
  --gold: #B8956A;
  --muted: #9B8E82;
  --border: #E0D8CE;
  --success: #7A9E7E;
  --warn: #C4956A;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--charcoal); min-height: 100vh; }

/* HEADER */
.site-header {
  background: var(--charcoal); color: var(--cream);
  padding: 0 24px; display: flex; align-items: center;
  justify-content: space-between; height: 64px;
  position: sticky; top: 0; z-index: 200;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 34px; height: 34px; border: 1.5px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Poppins', sans-serif; font-size: 15px;
  font-weight: 600; color: var(--gold);
}
.logo-text {
  font-family: 'Poppins', sans-serif; font-size: 13px;
  font-weight: 300; letter-spacing: 3px; text-transform: uppercase; color: var(--cream);
}
.header-meta { text-align: right; font-size: 10px; font-weight: 300; color: var(--stone); line-height: 1.7; }

/* BANNER */
.project-banner {
  background: var(--warm-white); border-bottom: 1px solid var(--border);
  padding: 24px; display: flex; align-items: flex-end;
  justify-content: space-between; flex-wrap: wrap; gap: 16px;
}
.project-title {
  font-family: 'Poppins', sans-serif; font-size: 32px;
  font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--bark);
}
.project-sub { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }
.progress-block { text-align: right; }
.progress-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.progress-bar-wrap { width: 160px; height: 2px; background: var(--border); margin-bottom: 4px; }
.progress-bar-fill { height: 100%; background: var(--gold); transition: width 0.5s; }
.progress-pct { font-family: 'Poppins', sans-serif; font-size: 24px; font-weight: 600; color: var(--bark); }

/* LAYOUT */
.layout { display: flex; min-height: calc(100vh - 64px); }

/* SIDEBAR */
.sidebar {
  width: 240px; min-width: 240px; background: var(--warm-white);
  border-right: 1px solid var(--border); padding: 24px 0;
  position: sticky; top: 64px; height: calc(100vh - 64px);
  overflow-y: auto; flex-shrink: 0;
}
.sidebar-plant {
  padding: 8px 20px 4px; font-size: 9px; font-weight: 500;
  letter-spacing: 2px; text-transform: uppercase; color: var(--stone);
}
.nav-btn {
  display: flex; align-items: center; width: 100%;
  padding: 11px 20px; cursor: pointer;
  border: none; border-left: 2px solid transparent;
  background: transparent; text-align: left;
  font-family: 'Poppins', sans-serif; font-size: 13px;
  color: var(--taupe); transition: all 0.15s;
  -webkit-appearance: none; appearance: none;
  touch-action: manipulation;
}
.nav-btn:hover, .nav-btn:active { background: var(--cream); color: var(--bark); }
.nav-btn.active { border-left-color: var(--gold); color: var(--bark); background: var(--cream); font-weight: 500; }
.sidebar-num { font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 300; color: var(--stone); margin-right: 8px; }
.sidebar-name { flex: 1; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.status-dot.partial { background: var(--warn); }
.status-dot.complete { background: var(--success); }

/* MAIN */
.main { flex: 1; padding: 32px 32px; max-width: 1000px; overflow-x: auto; }

/* SPACE HEADER */
.space-header {
  display: flex; align-items: flex-start;
  margin-bottom: 32px; padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.space-number {
  font-family: 'Poppins', sans-serif; font-size: 48px;
  font-weight: 200; color: var(--border); line-height: 1;
  margin-right: 16px; flex-shrink: 0;
}
.space-title { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 600; color: var(--bark); letter-spacing: 1px; text-transform: uppercase; }
.space-meta { display: flex; gap: 16px; margin-top: 6px; }
.meta-chip { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
.meta-chip span { color: var(--bark); font-weight: 500; }

/* TABS */
.tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 28px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.tab-btn {
  padding: 10px 16px; font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted); cursor: pointer;
  border: none; border-bottom: 2px solid transparent;
  background: transparent; white-space: nowrap;
  font-family: 'Poppins', sans-serif; font-weight: 400;
  transition: all 0.15s; -webkit-appearance: none; appearance: none;
  touch-action: manipulation;
}
.tab-btn:hover, .tab-btn:active { color: var(--bark); }
.tab-btn.active { color: var(--bark); border-bottom-color: var(--gold); font-weight: 500; }

/* PANELS */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* SECTION LABEL */
.section-label {
  font-size: 10px; font-weight: 500; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.section-spacer { margin-bottom: 28px; }
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* MOODBOARD */
.moodboard-drop {
  border: 1.5px dashed var(--border); border-radius: 2px;
  padding: 40px; text-align: center; background: var(--warm-white);
  position: relative; min-height: 180px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px;
}
.moodboard-drop input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
  width: 100%; height: 100%; touch-action: manipulation;
}
.drop-icon { font-size: 28px; opacity: 0.3; }
.drop-text { font-size: 13px; color: var(--muted); }
.drop-sub { font-size: 11px; color: var(--stone); }
.moodboard-preview { width: 100%; border-radius: 2px; display: block; }
.moodboard-actions { margin-top: 10px; }

/* NOTES */
.notes-area {
  width: 100%; min-height: 90px; border: 1px solid var(--border);
  border-radius: 2px; padding: 14px; font-family: 'Poppins', sans-serif;
  font-size: 13px; color: var(--charcoal); background: var(--warm-white);
  resize: vertical; outline: none; line-height: 1.7;
}
.notes-area:focus { border-color: var(--gold); }

/* PRODUCT TABLE */
.product-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; min-width: 600px; }
.product-table th {
  font-size: 9px; font-weight: 500; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted); padding: 8px 10px;
  text-align: left; border-bottom: 1px solid var(--border);
  background: var(--warm-white);
}
.product-table td { padding: 0; border-bottom: 1px solid var(--border); vertical-align: top; }
.product-table td input {
  width: 100%; border: none; padding: 9px 10px;
  font-family: 'Poppins', sans-serif; font-size: 12px;
  color: var(--charcoal); background: transparent; outline: none;
}
.product-table td input:focus { background: #FDF8F2; }
.product-table tr:hover td { background: #FDFAF6; }
.product-thumb { width: 44px; height: 44px; object-fit: cover; display: block; }
.thumb-cell { width: 56px; padding: 6px !important; }
.thumb-placeholder {
  width: 44px; height: 44px; background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; opacity: 0.5; cursor: pointer;
  position: relative; overflow: hidden;
}
.thumb-placeholder input[type="file"] {
  position: absolute; inset: 0; opacity: 0;
  cursor: pointer; touch-action: manipulation;
}
.row-del {
  background: none; border: none; cursor: pointer;
  color: var(--stone); font-size: 13px; padding: 9px 10px;
  font-family: 'Poppins', sans-serif;
  touch-action: manipulation;
}
.row-del:hover { color: #c0392b; }

/* BUTTONS */
.btn {
  padding: 9px 18px; font-family: 'Poppins', sans-serif;
  font-size: 10px; font-weight: 500; letter-spacing: 1.5px;
  text-transform: uppercase; cursor: pointer; border-radius: 1px;
  touch-action: manipulation; -webkit-appearance: none; appearance: none;
}
.btn-outline { background: transparent; color: var(--bark); border: 1px solid var(--border); }
.btn-outline:hover, .btn-outline:active { border-color: var(--bark); }
.btn-sm { padding: 6px 12px; font-size: 9px; }

/* LINK INPUT */
.link-row { display: flex; gap: 6px; align-items: center; }
.link-row input {
  flex: 1; border: none; padding: 9px 10px;
  font-family: 'Poppins', sans-serif; font-size: 12px;
  color: var(--charcoal); background: transparent; outline: none;
}
.link-row input:focus { background: #FDF8F2; }
.link-go {
  padding: 4px 8px; background: var(--bark); color: white;
  border: none; cursor: pointer; font-size: 11px; border-radius: 1px;
  text-decoration: none; flex-shrink: 0;
  touch-action: manipulation;
}

/* ACABADOS */
.acabados-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 20px; }
.acabado-card { background: var(--warm-white); border: 1px solid var(--border); padding: 16px; border-radius: 2px; }
.acabado-title { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; font-weight: 500; }
.acabado-card label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 3px; }
.acabado-card input {
  width: 100%; border: 1px solid var(--border); border-radius: 1px;
  padding: 7px 9px; font-family: 'Poppins', sans-serif; font-size: 12px;
  color: var(--charcoal); background: white; outline: none; margin-bottom: 8px;
}
.acabado-card input:focus { border-color: var(--gold); }

/* PLANO */
.plano-upload {
  border: 1.5px dashed var(--border); padding: 28px;
  text-align: center; background: var(--warm-white); border-radius: 2px;
  position: relative; min-height: 140px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 8px;
}
.plano-upload input[type="file"] {
  position: absolute; inset: 0; opacity: 0;
  cursor: pointer; touch-action: manipulation;
}
.plano-preview { max-width: 100%; max-height: 480px; display: block; margin: 0 auto; }

/* SAVE INDICATOR */
.save-indicator {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--charcoal); color: var(--cream);
  padding: 9px 18px; font-size: 10px; letter-spacing: 1px;
  opacity: 0; transition: opacity 0.3s; border-radius: 1px;
  pointer-events: none; z-index: 999;
}
.save-indicator.show { opacity: 1; }

/* MOBILE */
@media (max-width: 760px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; min-width: unset; position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 12px 0; }
  .main { padding: 20px 16px; }
  .acabados-grid { grid-template-columns: 1fr; }
  .logo-text { font-size: 14px; letter-spacing: 2px; }
  .header-meta { display: none; }
}
</style>

<script>
var SPACES = [
  { id: 'cocina',      num: '01', name: 'Cocina + Pantry',      planta: 'Planta Baja', m2: '15.55 + 8.32' },
  { id: 'sala',        num: '02', name: 'Sala + Comedor',        planta: 'Planta Baja', m2: '18.81 + 17.01' },
  { id: 'recamara',    num: '03', name: 'Recámara Principal',    planta: 'Planta Baja', m2: '40.86' },
  { id: 'bano',        num: '04', name: 'Baño Principal',        planta: 'Planta Baja', m2: '' },
  { id: 'mediobano',   num: '05', name: 'Medio Baño',            planta: 'Planta Baja', m2: '2.67' },
  { id: 'terraza',     num: '06', name: 'Terraza + Balcón',      planta: 'Planta Baja', m2: '19.98 + 14.36' },
  { id: 'salaprivada', num: '07', name: 'Sala Privada',          planta: 'Planta Alta', m2: '' },
  { id: 'lectura',     num: '08', name: 'Cuarto de Lectura',     planta: 'Planta Alta', m2: '13.29' },
  { id: 'recamarasec', num: '09', name: 'Recámara Secundaria',   planta: 'Planta Alta', m2: '32.89' },
  { id: 'multiusos',   num: '10', name: 'Recámara Multiusos',    planta: 'Planta Alta', m2: '33.95 + 4.52' },
  { id: 'lavanderia',  num: '11', name: 'Lavandería',            planta: 'Planta Alta', m2: '14.50' }
];

var TABS = [
  { key: 'moodboard',    label: 'Moodboard' },
  { key: 'mobiliario',   label: 'Mobiliario' },
  { key: 'acabados',     label: 'Acabados' },
  { key: 'herrajes',     label: 'Herrajes' },
  { key: 'iluminacion',  label: 'Iluminación' },
  { key: 'equipamiento', label: 'Equipamiento' },
  { key: 'carpinteria',  label: 'Carpintería' }
];

var SECTION_LABELS = {
  productos:    'Programa de Mobiliario',
  herrajes:     'Programa de Herrajes',
  iluminacion:  'Programa de Iluminación',
  equipamiento: 'Programa de Equipamiento',
  carpPiezas:   'Fichas Técnicas de Piezas'
};

var SECTION_BTNS = {
  productos:    '+ Agregar mueble',
  herrajes:     '+ Agregar herraje',
  iluminacion:  '+ Agregar luminaria',
  equipamiento: '+ Agregar equipo',
  carpPiezas:   '+ Agregar pieza'
};

var STORAGE_KEY = 'aurum_llave_maestra_v2';
var currentSpace = 'concepto';
var currentTab = 'moodboard';
var appData = {};
var saveTimer = null;

// ── DATA ──────────────────────────────────────
function defaultSpace() {
  return {
    moodboard: null,
    moodboardNotes: '',
    productos: [],
    acabados: {
      piso:  { material:'', modelo:'', marca:'', notas:'' },
      muro:  { material:'', modelo:'', marca:'', notas:'' },
      techo: { material:'', modelo:'', marca:'', notas:'' }
    },
    herrajes: [],
    iluminacion: [],
    equipamiento: [],
    carpinteria: { plano: null, notas: '', carpPiezas: [] }
  };
}

function defaultProduct() {
  return { img:'', nombre:'', desc:'', marca:'', dims:'', precio:'', entrega:'', link:'' };
}

function loadData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) appData = JSON.parse(raw);
  } catch(e) { appData = {}; }
  for (var i = 0; i < SPACES.length; i++) {
    if (!appData[SPACES[i].id]) appData[SPACES[i].id] = defaultSpace();
  }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    flashSave();
    updateProgress();
  } catch(e) {}
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveData, 600);
}

function flashSave() {
  var el = document.getElementById('saveIndicator');
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 1800);
}

// ── PROGRESS ──────────────────────────────────
function spaceScore(id) {
  var d = appData[id];
  if (!d) return 0;
  var s = 0;
  if (d.moodboard) s++;
  if (d.productos && d.productos.length) s++;
  if (d.acabados && d.acabados.piso && d.acabados.piso.material) s++;
  if (d.herrajes && d.herrajes.length) s++;
  if (d.equipamiento && d.equipamiento.length) s++;
  return s;
}

function updateProgress() {
  var total = 0;
  for (var i = 0; i < SPACES.length; i++) {
    var c = spaceScore(SPACES[i].id);
    var dot = document.getElementById('dot-' + SPACES[i].id);
    if (dot) dot.className = 'status-dot' + (c === 0 ? '' : (c >= 4 ? ' complete' : ' partial'));
    total += c;
  }
  var pct = Math.round(total / (SPACES.length * 5) * 100);
  document.getElementById('progressPct').textContent = pct;
  document.getElementById('globalProgress').style.width = pct + '%';
}

// ── SIDEBAR ───────────────────────────────────
function buildSidebar() {
  var html = '';
  var INTRO_SECTIONS = [
    { id: 'concepto', label: 'Concepto de Diseño' },
    { id: 'resumen',  label: 'Resumen de Interiores' },
    { id: 'planos',   label: 'Planos del Proyecto' }
  ];
  html += '<div class="sidebar-plant">Introducción</div>';
  for (var ii = 0; ii < INTRO_SECTIONS.length; ii++) {
    var sec = INTRO_SECTIONS[ii];
    html += '<button class="nav-btn' + (currentSpace === sec.id ? ' active' : '') + '" id="nav-' + sec.id + '" data-id="' + sec.id + '" data-intro="1">'
      + '<span class="sidebar-name" style="padding-left:4px">' + sec.label + '</span>'
      + '</button>';
  }
  html += '<div class="sidebar-plant" style="margin-top:8px">Espacios</div>';
  var lastPlanta = '';
  for (var i = 0; i < SPACES.length; i++) {
    var s = SPACES[i];
    if (s.planta !== lastPlanta) {
      html += '<div class="sidebar-plant">' + s.planta + '</div>';
      lastPlanta = s.planta;
    }
    html += '<button class="nav-btn' + (s.id === currentSpace ? ' active' : '') + '" id="nav-' + s.id + '" data-id="' + s.id + '">'
          + '<span class="sidebar-num">' + s.num + '</span>'
          + '<span class="sidebar-name">' + s.name + '</span>'
          + '<span class="status-dot" id="dot-' + s.id + '"></span>'
          + '</button>';
  }
  document.getElementById('sidebar').innerHTML = html;

  var btns = document.querySelectorAll('.nav-btn');
  for (var j = 0; j < btns.length; j++) {
    btns[j].addEventListener('click', function() {
      var id = this.getAttribute('data-id');
      var isIntro = this.getAttribute('data-intro');
      if (isIntro) { showIntro(id); } else { showSpace(id); }
    });
  }
}

// ── NAVIGATION ────────────────────────────────
var INTRO_IDS = ['concepto','resumen','planos'];

function isIntroId(id) {
  for (var i = 0; i < INTRO_IDS.length; i++) { if (INTRO_IDS[i] === id) return true; }
  return false;
}

function showSpace(id) {
  if (isIntroId(id)) { showIntro(id); return; }
  currentSpace = id;
  currentTab = 'moodboard';
  var btns = document.querySelectorAll('.nav-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  var nb = document.getElementById('nav-' + id);
  if (nb) nb.classList.add('active');
  renderSpace();
}

// ── INTRO SECTIONS ───────────────────────────
function showIntro(id) {
  currentSpace = id;
  var btns = document.querySelectorAll('.nav-btn');

function bindIntro(id) {
  if (id === 'concepto') {
    ['texto1','texto2','hygge'].forEach(function(f) {
      var el = document.getElementById('concepto-'+f);
      if (el) el.addEventListener('input', function() {
        if (!appData._concepto) appData._concepto = {};
        appData._concepto[f] = this.value;
        scheduleSave();
      });
    });
  }
  if (id === 'resumen') {
    var fields = document.querySelectorAll('.resumenField');
    for (var i = 0; i < fields.length; i++) {
      fields[i].addEventListener('input', function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        var field = this.getAttribute('data-field');
        if (!appData._resumen) appData._resumen = getDefaultResumen();
        appData._resumen[idx][field] = this.value;
        scheduleSave();
      });
    }
  }
  if (id === 'planos') {
    var planoInputs = document.querySelectorAll('.planoIntroInput');
    for (var j = 0; j < planoInputs.length; j++) {
      planoInputs[j].addEventListener('change', function() {
        var key = this.getAttribute('data-key');
        var me = this;
        readFile(this.files[0], function(result) {
          if (!appData._planos) appData._planos = {};
          appData._planos[key] = result;
          saveData();
          renderIntro('planos');
        });
      });
    }
    var clearBtns = document.querySelectorAll('[data-clear-plano]');
    for (var k = 0; k < clearBtns.length; k++) {
      clearBtns[k].addEventListener('click', function() {
        var key = this.getAttribute('data-clear-plano');
        if (!appData._planos) appData._planos = {};
        appData._planos[key] = null;
        saveData();
        renderIntro('planos');
      });
    }
  }

function showTab(key) {
  currentTab = key;
  var tbs = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < tbs.length; i++) tbs[i].classList.remove('active');
  var tb = document.getElementById('tb-' + key);
  if (tb) tb.classList.add('active');
  var panels = document.querySelectorAll('.tab-panel');
  for (var j = 0; j < panels.length; j++) panels[j].classList.remove('active');
  var p = document.getElementById('panel-' + key);
  if (p) p.classList.add('active');
}

// ── RENDER SPACE ──────────────────────────────
function renderSpace() {
  if (isIntroId(currentSpace)) { renderIntro(currentSpace); return; }
  var space = null;
  for (var i = 0; i < SPACES.length; i++) { if (SPACES[i].id === currentSpace) { space = SPACES[i]; break; } }
  if (!space) return;
  var d = appData[currentSpace];
  var main = document.getElementById('mainContent');

  // Header
  var headerHtml = '<div class="space-header">'
    + '<div class="space-number">' + space.num + '</div>'
    + '<div><div class="space-title">' + space.name + '</div>'
    + '<div class="space-meta"><div class="meta-chip">' + space.planta + '</div>'
    + (space.m2 ? '<div class="meta-chip">· <span>' + space.m2 + ' m²</span></div>' : '')
    + '</div></div></div>';

  // Tabs
  var tabsHtml = '<div class="tabs">';
  for (var t = 0; t < TABS.length; t++) {
    tabsHtml += '<button class="tab-btn' + (TABS[t].key === currentTab ? ' active' : '') + '" id="tb-' + TABS[t].key + '" data-tab="' + TABS[t].key + '">' + TABS[t].label + '</button>';
  }
  tabsHtml += '</div>';

  // Panels
  var panelsHtml = '';
  for (var p2 = 0; p2 < TABS.length; p2++) {
    var k = TABS[p2].key;
    var active = k === currentTab ? ' active' : '';
    panelsHtml += '<div class="tab-panel' + active + '" id="panel-' + k + '">';
    if (k === 'moodboard')    panelsHtml += buildMoodboard(d);
    if (k === 'mobiliario')   panelsHtml += buildProductSection('productos', d.productos);
    if (k === 'acabados')     panelsHtml += buildAcabados(d.acabados);
    if (k === 'herrajes')     panelsHtml += buildProductSection('herrajes', d.herrajes);
    if (k === 'iluminacion')  panelsHtml += buildProductSection('iluminacion', d.iluminacion);
    if (k === 'equipamiento') panelsHtml += buildProductSection('equipamiento', d.equipamiento);
    if (k === 'carpinteria')  panelsHtml += buildCarpinteria(d.carpinteria);
    panelsHtml += '</div>';
  }

  main.innerHTML = headerHtml + tabsHtml + panelsHtml;

  // Bind tab buttons
  var tabBtns = document.querySelectorAll('.tab-btn');
  for (var tb = 0; tb < tabBtns.length; tb++) {
    tabBtns[tb].addEventListener('click', function() {
      showTab(this.getAttribute('data-tab'));
    });
  }

  // Bind all interactive elements
  bindAll();
}

// ── ACABADOS ──────────────────────────────────
function buildAcabados(acabados) {
  var zones = [{ key:'piso', label:'Piso' }, { key:'muro', label:'Muro' }, { key:'techo', label:'Techo' }];
  var html = '';
  for (var i = 0; i < zones.length; i++) {
    var z = zones[i];
    var a = (acabados && acabados[z.key]) ? acabados[z.key] : {};
    if (i > 0) html += '<div class="divider"></div>';
    html += '<div class="section-spacer">'
          + '<div class="section-label">' + z.label + '</div>'
          + '<div class="acabados-grid">'
          + acabadoCard('Material', 'acabado-' + z.key + '-material', a.material || '')
          + acabadoCard('Modelo / Acabado', 'acabado-' + z.key + '-modelo', a.modelo || '')
          + acabadoCard('Marca / Proveedor', 'acabado-' + z.key + '-marca', a.marca || '', 'Notas', 'acabado-' + z.key + '-notas', a.notas || '')
          + '</div></div>';
  }
  return html;
}

function acabadoCard(label, id, val, label2, id2, val2) {

    html += '<label>' + label2 + '</label><input id="' + id2 + '" value="' + esc(val2) + '" placeholder="' + label2 + '…" class="acabadoField" data-acabado-id="' + id2 + '">';

// ── BIND ALL EVENTS ───────────────────────────
function bindAll() {
  var d = appData[currentSpace];

  // Moodboard upload
  var moodInput = document.getElementById('moodboardInput');
  if (moodInput) {
    moodInput.addEventListener('change', function() {
      readFile(this.files[0], function(result) {
        appData[currentSpace].moodboard = result;
        saveData();
        renderSpace();
      });
    });
  }

  // Clear moodboard
  var clearMood = document.getElementById('clearMoodBtn');
  if (clearMood) {
    clearMood.addEventListener('click', function() {
      appData[currentSpace].moodboard = null;
      saveData(); renderSpace();
    });
  }

  // Moodboard notes
  var moodNotes = document.getElementById('moodboardNotes');
  if (moodNotes) {
    moodNotes.addEventListener('input', function() {
      appData[currentSpace].moodboardNotes = this.value;
      scheduleSave();
    });
  }

  // Product fields
  var prodFields = document.querySelectorAll('.prodField');
  for (var i = 0; i < prodFields.length; i++) {
    prodFields[i].addEventListener('input', function() {
      var section = this.getAttribute('data-section');
      var idx = parseInt(this.getAttribute('data-idx'));
      var field = this.getAttribute('data-field');
      var arr = getSection(section);
      if (arr && arr[idx]) { arr[idx][field] = this.value; scheduleSave(); }
    });
  }

  // Product image upload
  var prodImgs = document.querySelectorAll('.prodImgInput');
  for (var j = 0; j < prodImgs.length; j++) {
    prodImgs[j].addEventListener('change', function() {
      var section = this.getAttribute('data-section');
      var idx = parseInt(this.getAttribute('data-idx'));
      var me = this;
      readFile(this.files[0], function(result) {
        var arr = getSection(section);
        if (arr && arr[idx]) { arr[idx].img = result; saveData(); renderSection(section); }
      });
    });
  }

  // Add product row buttons
  var addBtns = document.querySelectorAll('[id^="addBtn-"]');
  for (var k = 0; k < addBtns.length; k++) {
    addBtns[k].addEventListener('click', function() {
      var section = this.getAttribute('data-section');
      var arr = getSection(section);
      if (arr) { arr.push(defaultProduct()); saveData(); renderSection(section); }
    });
  }

  // Delete row buttons
  var delBtns = document.querySelectorAll('.row-del');
  for (var m = 0; m < delBtns.length; m++) {
    delBtns[m].addEventListener('click', function() {
      var section = this.getAttribute('data-section');
      var idx = parseInt(this.getAttribute('data-idx'));
      var arr = getSection(section);
      if (arr) { arr.splice(idx, 1); saveData(); renderSection(section); }
    });
  }

  // Acabados fields
  var acabFields = document.querySelectorAll('.acabadoField');
  for (var n = 0; n < acabFields.length; n++) {
    acabFields[n].addEventListener('input', function() {
      var parts = this.getAttribute('data-acabado-id').split('-');
      // parts: acabado, zone, field [, field2]
      var zone = parts[1];
      var field = parts[2];
      if (!appData[currentSpace].acabados[zone]) appData[currentSpace].acabados[zone] = {};
      appData[currentSpace].acabados[zone][field] = this.value;
      scheduleSave();
    });
  }

  // Plano upload
  var planoInput = document.getElementById('planoInput');
  if (planoInput) {
    planoInput.addEventListener('change', function() {
      readFile(this.files[0], function(result) {
        appData[currentSpace].carpinteria.plano = result;
        saveData(); renderSpace();
      });
    });
  }

  // Clear plano
  var clearPlano = document.getElementById('clearPlanoBtn');
  if (clearPlano) {
    clearPlano.addEventListener('click', function() {
      appData[currentSpace].carpinteria.plano = null;
      saveData(); renderSpace();
    });
  }

  // Carpintería notes
  var carpNotes = document.getElementById('carpNotes');
  if (carpNotes) {
    carpNotes.addEventListener('input', function() {
      appData[currentSpace].carpinteria.notas = this.value;
      scheduleSave();
    });
  }
}

// ── HELPERS ───────────────────────────────────
function getSection(section) {
  var d = appData[currentSpace];
  if (section === 'carpPiezas') return d.carpinteria.carpPiezas;
  return d[section];
}

function renderSection(section) {
  var d = appData[currentSpace];
  var items = getSection(section);
  var panelKey = section === 'productos' ? 'mobiliario' : (section === 'carpPiezas' ? 'carpinteria' : section);

  if (section === 'carpPiezas') {
    var panel = document.getElementById('panel-carpinteria');
    if (panel) { panel.innerHTML = buildCarpinteria(d.carpinteria); bindAll(); }
    return;
  }

  var tbody = document.getElementById('tbody-' + section);
  if (tbody) {
    var html = '';
    for (var i = 0; i < items.length; i++) html += buildProductRow(section, items[i], i);
    tbody.innerHTML = html;
    bindAll();
  }
}

function readFile(file, cb) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) { cb(e.target.result); };
  reader.readAsDataURL(file);
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/"/g,'&quot;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}



// ── BACKUP & RESTORE ──────────────────────────
function backupData() {
  var json = JSON.stringify(appData, null, 2);
  var blob = new Blob([json], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var now = new Date();
  var dateStr = now.getFullYear() + '-' + 
    String(now.getMonth()+1).padStart(2,'0') + '-' + 
    String(now.getDate()).padStart(2,'0');
  a.href = url;
  a.download = 'llave-maestra-respaldo-' + dateStr + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function restoreData(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var restored = JSON.parse(e.target.result);
      // Validate it looks like our data
      var valid = false;
      for (var i = 0; i < SPACES.length; i++) {
        if (restored[SPACES[i].id]) { valid = true; break; }
      }
      if (!valid) {
        alert('Este archivo no parece un respaldo válido de Llave Maestra.');
        return;
      }
      appData = restored;
      // Fill in any missing spaces
      for (var j = 0; j < SPACES.length; j++) {
        if (!appData[SPACES[j].id]) appData[SPACES[j].id] = defaultSpace();
      }
      saveData();
      buildSidebar();
      renderSpace();
      updateProgress();
      alert('Respaldo restaurado correctamente.');
    } catch(err) {
      alert('Error al leer el archivo. Asegúrate de que sea un respaldo válido.');
    }
  };
  reader.readAsText(file);
}

          spacesHtml += staticCell('Material', a.material);
          spacesHtml += staticCell('Modelo / Acabado', a.modelo);
          spacesHtml += staticCell('Marca / Proveedor', a.marca);

      if (tk === 'carpinteria') {

        spacesHtml += staticTable(carp.carpPiezas || [], 'Fichas Técnicas');
        if (carp.notas) spacesHtml += '<div style="margin-top:16px;padding:16px;background:#FDFBF8;border:1px solid #E0D8CE;font-size:13px;line-height:1.7;">'+escStatic(carp.notas)+'</div>';
      }

      spacesHtml += '</div>';
    }
    spacesHtml += '</div>';
  }

  function staticTable(items, title) {

    var t = '<div class="section-label">'+title+'</div><div style="overflow-x:auto"><table class="product-table"><thead><tr>';

  function escStatic(str) {

  // Get logo from current page

  var deliveryHtml = '<!DOCTYPE html><html lang="es"><head>'+

    '<style>'+document.querySelector('style').textContent+

    '.nav-btn-static:hover,.nav-btn-static.active{background:#F7F4EF;color:#4A3728;border-left-color:#B8956A;font-weight:500;}'+
    '.tab-btn-static{padding:10px 16px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#9B8E82;cursor:pointer;border:none;border-bottom:2px solid transparent;background:transparent;white-space:nowrap;font-family:"Poppins",sans-serif;}'+
    '.tab-btn-static.active{color:#4A3728;border-bottom-color:#B8956A;font-weight:500;}'+
    '</style></head><body>'+
    '<header class="site-header">'+

    '</header>'+

    '<div class="layout">'+
    '<nav class="sidebar">'+sidebarHtml+'</nav>'+
    '<main class="main" id="staticMain">'+spacesHtml+'</main>'+
    '</div>'+
    '<script>'+
    'function showStaticSpace(id){'+
    'var all=document.querySelectorAll(".space-block");for(var i=0;i<all.length;i++)all[i].style.display="none";'+
    'var el=document.getElementById("static-"+id);if(el)el.style.display="block";'+

document.addEventListener('DOMContentLoaded', function() {
  var exportBtn = document.getElementById('exportBtn');
  if (exportBtn) exportBtn.addEventListener('click', exportEntrega);

  var backupBtn = document.getElementById('backupBtn');
